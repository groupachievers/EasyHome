<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interswitch Test Payment</title>

  <!-- Interswitch Inline Checkout Script -->
  <script src="https://newwebpay.qa.interswitchng.com/inline-checkout.js"></script>
</head>

<body style="display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">

  <button onclick="pay()" style="padding:15px 25px; font-size:16px; cursor:pointer;">
    Pay Now
  </button>

  <script>
    function pay() {
      const paymentRequest = {
        merchant_code: "MX153376",
        pay_item_id: "5558761", // ✅ use your correct one
        txn_ref: "MX-" + Date.now(), // unique reference
        amount: "3000", // ₦30
        currency: 566,
        site_redirect_url: window.location.href,
        mode: "TEST",

        onComplete: function(response) {
          console.log("Payment Response:", response);
          alert("Payment response received. Check console.");
        }
      };

      window.webpayCheckout(paymentRequest);
    }
  </script>

</body>
</html>
